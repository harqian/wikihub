<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access denied — wikihub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border: #30363d;
    --border-hover: #484f58;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-tertiary: #6e7681;
    --accent: #58a6ff;
    --accent-hover: #79c0ff;
    --accent-muted: rgba(56,139,253,0.15);
    --green: #3fb950;
    --orange: #d29922;
    --orange-muted: rgba(210,153,34,0.15);
    --red: #f85149;
    --purple: #bc8cff;
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
    --radius: 6px;
    --radius-lg: 8px;
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 32px;
    --space-2xl: 48px;
    --touch-min: 44px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.5;
    color: var(--text-primary);
    background: var(--bg-primary);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* top nav */
  .topnav {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    padding: var(--space-sm) var(--space-md);
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    min-height: var(--touch-min);
    flex-shrink: 0;
  }
  .topnav-logo {
    font-weight: 700;
    font-size: 18px;
    color: var(--text-primary);
    text-decoration: none;
    white-space: nowrap;
  }
  .topnav-logo span { color: var(--accent); }
  .topnav-right {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    margin-left: auto;
  }
  .topnav-right a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 14px;
    padding: var(--space-sm) var(--space-md);
    border-radius: var(--radius);
    min-height: var(--touch-min);
    display: flex;
    align-items: center;
  }
  .topnav-right a:hover { color: var(--text-primary); background: var(--bg-tertiary); }

  /* center content */
  .error-page {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-lg);
  }

  .error-card {
    text-align: center;
    max-width: 480px;
    width: 100%;
  }

  .error-icon {
    font-size: 72px;
    margin-bottom: var(--space-lg);
    opacity: 0.7;
    display: block;
    line-height: 1;
  }

  .error-heading {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: var(--space-sm);
  }

  .error-sub {
    font-size: 16px;
    color: var(--text-secondary);
    margin-bottom: var(--space-xl);
    line-height: 1.6;
  }

  .error-wiki-ref {
    display: inline-flex;
    align-items: center;
    gap: var(--space-sm);
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--space-sm) var(--space-md);
    margin-bottom: var(--space-xl);
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--text-secondary);
  }
  .error-wiki-ref .lock { color: var(--orange); }

  .error-actions {
    display: flex;
    gap: var(--space-md);
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-sm);
    padding: 10px 24px;
    border-radius: var(--radius);
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    min-height: var(--touch-min);
    min-width: 140px;
    transition: background 0.1s, border-color 0.1s;
  }
  .btn-primary {
    background: var(--accent);
    border: 1px solid var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn-secondary {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    color: var(--text-primary);
  }
  .btn-secondary:hover { border-color: var(--border-hover); background: var(--border); }

  .error-footer {
    margin-top: var(--space-2xl);
    font-size: 13px;
    color: var(--text-tertiary);
  }
  .error-footer code {
    font-family: var(--font-mono);
    background: var(--bg-secondary);
    padding: 2px 6px;
    border-radius: 3px;
  }

  @media (max-width: 767px) {
    .error-heading { font-size: 22px; }
    .error-icon { font-size: 56px; }
    .error-actions { flex-direction: column; align-items: center; }
    .btn { width: 100%; max-width: 280px; }
  }
</style>
</head>
<body>

<nav class="topnav">
  <a href="/" class="topnav-logo">wiki<span>hub</span></a>
  <div class="topnav-right">
    <a href="/explore">Explore</a>
    <a href="/login">Sign in</a>
  </div>
</nav>

<main class="error-page">
  <div class="error-card">
    <span class="error-icon">🔒</span>

    <h1 class="error-heading">You don't have access to this page</h1>

    <p class="error-sub">
      This page is private. If you think you should have access, contact the wiki owner.
    </p>

    <div class="error-wiki-ref">
      <span class="lock">🔒</span>
      @alice / ml-research
    </div>

    <div class="error-actions">
      <a href="/login" class="btn btn-primary">Sign in</a>
      <a href="/explore" class="btn btn-secondary">Go to Explore</a>
    </div>

    <p class="error-footer">
      <code>403</code> — you can also try requesting access from the wiki owner.
    </p>
  </div>
</main>

</body>
</html>
